<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sinalys — ERP de Orçamentação Viária</title>

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Raleway:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Define o tema ANTES do CSS pintar (evita flash + garante modo claro funcional) -->
  <script>
    (function () {
      var s = localStorage.getItem('sinalys_dark');
      var dark = s === null
        ? window.matchMedia('(prefers-color-scheme: dark)').matches
        : s === '1';
      document.documentElement.classList.add(dark ? 'dark' : 'light');
    })();
  </script>

  <link rel="stylesheet" href="css/style.css" />

  <!-- Theme color -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />

  <!-- Favicon mínimo inline -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23c32c30' d='M12 2L2 7l10 5 10-5-10-5zm0 10L2 7v10l10 5 10-5V7l-10 5z'/></svg>" />
</head>
<body>

  <!-- ── Tela de Login ───────────────────────────────────────────────────── -->
  <div id="screen-login" class="login-screen"></div>

  <!-- ── Shell principal (sidebar + topbar + conteúdo) ─────────────────── -->
  <div id="screen-app" class="hidden app-layout"></div>

  <!-- ── Toast container ────────────────────────────────────────────────── -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- ── Entry point ES Module ──────────────────────────────────────────── -->
  <script type="module">
    import { initRouter } from './js/app.js';
    initRouter();
  </script>

</body>
</html>
